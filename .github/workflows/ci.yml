name: CI

on:
  pull_request:
  push:
    branches: [ main ]

# Least privilege by default; the jvm job widens to post the coverage comment.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kotlin-lint:
    name: Kotlin lint (ktlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ktlintCheck spans all modules, including the Android app, whose configuration
      # needs the SDK.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlintCheck
        run: ./gradlew ktlintCheck --stacktrace

  jvm:
    name: JVM tests + coverage (backend, android, shared)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage PR comment
    env:
      # Ryuk's sidecar container is the most common Testcontainers CI flake; the runner is
      # ephemeral and self-cleans, so disabling it is safe. (The :backend:test task forwards
      # this env var into the test workers.)
      TESTCONTAINERS_RYUK_DISABLED: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gradle 9.4.1 runs on a modern JDK; the build's jvmToolchain(11) is provisioned
      # separately by the foojay resolver in settings.gradle.kts.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Pre-pull the Postgres image so Testcontainers' timed container start doesn't race on
      # the image download (a cause of startup-timeout flakes).
      - name: Pre-pull Postgres image
        run: docker pull postgres:16-alpine

      # Docker is preinstalled on ubuntu-latest, so the backend's Testcontainers
      # (Postgres) work with no extra setup or secrets. Each report task runs its tests.
      - name: Tests + coverage reports
        run: ./gradlew :backend:jacocoTestReport :androidApp:jacocoTestReport :shared:jvmTest --stacktrace

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/build/reports/jacoco/test/
            androidApp/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/build/reports/tests/
            androidApp/build/reports/tests/
            shared/build/reports/tests/
          if-no-files-found: ignore

      - name: Coverage PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: |
            ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/androidApp/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          # Report-only: 0 thresholds never fail the check. Raise these (and add a branch
          # protection rule requiring this job) to gate on coverage later.
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  web:
    name: Web (build + lint + tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage PR comment
    defaults:
      run:
        working-directory: webApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Tests + coverage
        run: npm run test:coverage

      - name: Coverage PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: webApp

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: webApp/coverage/
          if-no-files-found: warn
