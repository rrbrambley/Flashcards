name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  # Manually trigger a full run (incl. the native jobs) from the Actions tab.
  workflow_dispatch:

# Least privilege by default; the jvm job widens to post the coverage comment.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas a PR touches so each job runs only when relevant code changed (FLA-60).
  # Runs in a few seconds on Linux. The `ci-passed` aggregator (bottom) fans these in so branch
  # protection can require a single check even when some jobs are path-skipped. GitHub Actions is
  # free for public repos on standard runners (incl. macOS), so the native jobs run automatically
  # on relevant changes rather than behind an opt-in label.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # paths-filter lists a PR's changed files via the API
    outputs:
      kotlin: ${{ steps.filter.outputs.kotlin }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      # Whether the Kotlin/Native side changed — gates the (slow, macOS) shared iOS test within the
      # ios job, so a Swift-only PR skips it (FLA-141).
      ios_kmp: ${{ steps.filter.outputs.ios_kmp }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # `gradle` is a shared base (anchored below): the root build config + this workflow affect
          # every Gradle module, so touching them re-runs all Gradle jobs. `shared/` is the common
          # dependency — Android, backend, and the iOS framework all build on it — so it triggers
          # their jobs too (but NOT web, which hand-mirrors the DTOs in TypeScript).
          filters: |
            gradle: &gradle
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '.github/workflows/ci.yml'
            kotlin:
              - *gradle
              - 'shared/**'
              - 'backend/**'
              - 'androidApp/**'
              # The shared grading (FLA-81) + shuffle (FLA-200) golden fixtures drive both this job's
              # :shared:jvmTest and the web job below, so a fixture-only edit must re-run both to
              # catch parity drift.
              - 'testFixtures/practice-grading/**'
              - 'testFixtures/practice-shuffle/**'
            android:
              - *gradle
              - 'shared/**'
              - 'androidApp/**'
            ios:
              - *gradle
              - 'shared/**'
              - 'iosApp/**'
            # The Kotlin/Native half of the ios job (the shared iOS test). A Swift-only change
            # (iosApp/** without shared/gradle) doesn't affect it, so it's skipped there (FLA-141).
            ios_kmp:
              - *gradle
              - 'shared/**'
            web:
              - '.github/workflows/ci.yml'
              - 'webApp/**'
              - 'testFixtures/practice-grading/**'
              - 'testFixtures/practice-shuffle/**'

  kotlin-lint:
    name: Kotlin lint (ktlint)
    needs: changes
    if: ${{ needs.changes.outputs.kotlin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ktlintCheck spans all modules, including the Android app, whose configuration
      # needs the SDK.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Publish a Build Scan per Gradle invocation to scans.gradle.com for easier CI triage
          # (FLA-139). Publishing to the public service requires agreeing to Gradle's terms of use.
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: ktlintCheck
        run: ./gradlew ktlintCheck --stacktrace

  jvm:
    name: JVM tests + coverage (backend, android, shared)
    needs: changes
    if: ${{ needs.changes.outputs.kotlin == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage PR comment
    env:
      # Ryuk's sidecar container is the most common Testcontainers CI flake; the runner is
      # ephemeral and self-cleans, so disabling it is safe. (The :backend:test task forwards
      # this env var into the test workers.)
      TESTCONTAINERS_RYUK_DISABLED: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Gradle 9.4.1 runs on a modern JDK; the build's jvmToolchain(11) is provisioned
      # separately by the foojay resolver in settings.gradle.kts.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Publish a Build Scan per Gradle invocation to scans.gradle.com for easier CI triage
          # (FLA-139). Publishing to the public service requires agreeing to Gradle's terms of use.
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      # Pre-pull the Postgres image so Testcontainers' timed container start doesn't race on
      # the image download (a cause of startup-timeout flakes). Only the PR run needs it.
      - name: Pre-pull Postgres image
        if: ${{ github.event_name == 'pull_request' }}
        run: docker pull postgres:16-alpine

      # On a PR: run the full suite (Testcontainers-backed backend tests + coverage). Docker is
      # preinstalled on ubuntu-latest, so the backend's Testcontainers (Postgres) work with no setup.
      - name: Tests + coverage reports
        if: ${{ github.event_name == 'pull_request' }}
        run: ./gradlew :backend:jacocoTestReport :androidApp:jacocoTestReport :shared:jvmTest --stacktrace

      # On push to main: the PR already validated this exact content, so don't re-run the (slow)
      # Testcontainers suite. Compile main + test sources instead — enough to populate the Gradle
      # dependency + build cache that PR jobs restore (the cache is keyed per job id, so this `jvm`
      # job must run on main to keep PR `jvm` runs warm), without the test execution (FLA-145).
      - name: Warm cache (compile only)
        if: ${{ github.event_name != 'pull_request' }}
        run: ./gradlew :backend:compileTestKotlin :androidApp:compileDebugUnitTestKotlin :shared:compileTestKotlinJvm --stacktrace

      - name: Upload coverage reports
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/build/reports/jacoco/test/
            androidApp/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test results
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/build/reports/tests/
            androidApp/build/reports/tests/
            shared/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

      - name: Coverage PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: |
            ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/androidApp/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          # Report-only: 0 thresholds never fail the check. Raise these (and add a branch
          # protection rule requiring this job) to gate on coverage later.
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  web:
    name: Web (build + lint + tests)
    needs: changes
    # PR-only: the PR already validated this content; don't re-run the full web build+test on every
    # merge. (npm install is fast even cold, so losing main's npm-cache warming is negligible — FLA-145.)
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage PR comment
    defaults:
      run:
        working-directory: webApp
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Tests + coverage
        run: npm run test:coverage

      - name: Coverage PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: webApp

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: webApp/coverage/
          if-no-files-found: warn
          retention-days: 7

  android-instrumented:
    name: Android instrumented tests
    # Runs whenever Android/shared code changed (free on public repos). On push to main it warms the
    # AVD + Gradle caches into main's cache scope (so PRs restore them) without running the emulator
    # test — see the per-step `push` guards below.
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' || needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Publish a Build Scan per Gradle invocation to scans.gradle.com for easier CI triage
          # (FLA-139). Publishing to the public service requires agreeing to Gradle's terms of use.
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      # The Android emulator needs KVM hardware acceleration; ubuntu-latest provides it once the
      # device node is made accessible to the runner user.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache the generated AVD + its warm snapshot so most runs boot from snapshot instead of
      # cold-creating the emulator (the slowest part). Running this job on push to main saves the
      # snapshot into main's cache scope, which is what PRs restore from (FLA-143).
      - name: Cache AVD
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot."

      - name: Instrumented tests (connectedDebugAndroidTest)
        if: ${{ github.event_name != 'push' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :androidApp:connectedDebugAndroidTest --stacktrace

      # On push to main: compile the instrumented test APK (no emulator) to warm the Gradle cache;
      # the AVD snapshot above is already saved to main's cache scope for PRs to restore.
      - name: Warm instrumented build (compile only)
        if: ${{ github.event_name == 'push' }}
        run: ./gradlew :androidApp:assembleDebugAndroidTest --stacktrace

      - name: Upload instrumented test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: androidApp/build/reports/androidTests/
          if-no-files-found: ignore
          retention-days: 7

  ios:
    name: iOS (build + shared iOS tests)
    # Runs whenever iOS/shared code changed. Free on public repos (standard macOS runner), so it's
    # automatic rather than opt-in. On push to main it warms the konan + Xcode DerivedData caches
    # (into main's scope, for PRs to restore) via a build-only pass — see the `push` guards below.
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' || needs.changes.outputs.ios == 'true'
    # Apple-silicon macOS runner: matches the iosSimulatorArm64 target + has Xcode/simulators
    # preinstalled. The iosApp/ Xcode project is generated by XcodeGen (it's gitignored).
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # JDK + Gradle to build the shared Kotlin/Native framework (jvmToolchain(11) is
      # provisioned separately by the foojay resolver).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Publish a Build Scan per Gradle invocation to scans.gradle.com for easier CI triage
          # (FLA-139). Publishing to the public service requires agreeing to Gradle's terms of use.
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      # Cache the Kotlin/Native compiler + dependencies (~1 GB) keyed on the version catalog,
      # so most runs skip the konan download. Warmed on push to main (into main's cache scope).
      - name: Cache Kotlin/Native
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # Restore Xcode DerivedData so `xcodebuild test` does an incremental Swift compile and reuses
      # the already-built SwiftPM dependencies (SDWebImage*, GoogleSignIn) instead of rebuilding them
      # from scratch. The key is intentionally stable (no source hash) so it persists across commits;
      # `project.yml` bumps it when the package set / build settings change. If a stale module cache
      # ever breaks a build, bump the key suffix to clear it.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v6
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('iosApp/project.yml') }}
          restore-keys: deriveddata-${{ runner.os }}-

      # Surface the toolchain versions to make first-run debugging easy (Xcode/SDK/runtimes).
      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep -i ios || true

      # The shared module's iOS tests compile + run the Kotlin/Native test binary on a
      # simulator: the transparent-refresh + auth + repository tests on the actual iOS target.
      # Skipped on a Swift-only PR (iosApp/** with no shared/gradle change) — the Kotlin/Native
      # side is unaffected (FLA-141) — and on push to main, where the framework build below already
      # warms konan without paying for the extra KN compile + sim run. A manual dispatch runs it.
      - name: Shared iOS tests
        if: ${{ github.event_name != 'push' && (needs.changes.outputs.ios_kmp == 'true' || github.event_name == 'workflow_dispatch') }}
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace

      # HOMEBREW_NO_AUTO_UPDATE skips the formula-index refresh (the slow part), saving ~30–60s on
      # the macOS runner for a tool that rarely changes (FLA-142).
      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      # On a PR (or dispatch): full `test` on a booted simulator (FLA-54). On push to main:
      # `build-for-testing` only — it builds the shared framework (warms konan) + SwiftPM deps
      # (warms DerivedData) into main's cache scope for PRs to restore, without re-running the tests
      # the PR already passed. `test` needs a concrete device; the warm build uses a generic one.
      # The "Compile Kotlin Framework" build phase runs embedAndSignAppleFrameworkForXcode
      # (JAVA_HOME comes from setup-java).
      - name: Build + test iOS app (simulator)
        working-directory: iosApp
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ACTION=build-for-testing
            DEST="generic/platform=iOS Simulator"
          else
            UDID=$(xcrun simctl list devices available --json \
              | python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print(next(x['udid'] for v in d.values() for x in v if 'iPhone' in x['name']))")
            echo "Using simulator $UDID"
            ACTION=test
            DEST="id=$UDID"
          fi
          xcodebuild \
            -project Flashcards.xcodeproj \
            -scheme Flashcards \
            -configuration Debug \
            -destination "$DEST" \
            CODE_SIGNING_ALLOWED=NO \
            "$ACTION"

      - name: Upload iOS test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: shared/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  # Fan-in so branch protection can require ONE check ("CI passed") even when some jobs are
  # path-skipped: green iff every job that ran passed (skipped counts as OK). Always runs so it
  # reports a status even when the jobs it needs were skipped.
  ci-passed:
    name: CI passed
    if: ${{ always() }}
    needs: [changes, kotlin-lint, jvm, web, android-instrumented, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          echo "Job results: ${{ join(needs.*.result, ', ') }}"
          for r in ${{ join(needs.*.result, ' ') }}; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job did not pass (result: $r)."
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
