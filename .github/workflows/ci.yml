name: CI

on:
  pull_request:
    # `labeled` is included so adding the ci:android / ci:ios / ci:native opt-in label re-triggers CI
    # (the default event types don't include it). See the android-instrumented / ios job gates below.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [ main ]
  # Manually run the opt-in native jobs from the Actions tab (they otherwise require a PR label).
  workflow_dispatch:
    inputs:
      run_android:
        description: 'Run the Android instrumented tests'
        type: boolean
        default: false
      run_ios:
        description: 'Run the iOS build + tests'
        type: boolean
        default: false

# Least privilege by default; the jvm job widens to post the coverage comment.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas a PR touches so each job runs only when relevant code changed (FLA-60).
  # Runs in a few seconds on Linux. `main` isn't branch-protected, so a skipped job is simply
  # absent from the checks (no aggregator gate needed; add one if protection is enabled later).
  # The two expensive native jobs (android-instrumented, ios) additionally require an opt-in label
  # or a manual dispatch — see their `if:` gates (FLA-72).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # paths-filter lists a PR's changed files via the API
    outputs:
      kotlin: ${{ steps.filter.outputs.kotlin }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `gradle` is a shared base (anchored below): the root build config + this workflow affect
          # every Gradle module, so touching them re-runs all Gradle jobs. `shared/` is the common
          # dependency — Android, backend, and the iOS framework all build on it — so it triggers
          # their jobs too (but NOT web, which hand-mirrors the DTOs in TypeScript).
          filters: |
            gradle: &gradle
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '.github/workflows/ci.yml'
            kotlin:
              - *gradle
              - 'shared/**'
              - 'backend/**'
              - 'androidApp/**'
            android:
              - *gradle
              - 'shared/**'
              - 'androidApp/**'
            ios:
              - *gradle
              - 'shared/**'
              - 'iosApp/**'
            web:
              - '.github/workflows/ci.yml'
              - 'webApp/**'

  kotlin-lint:
    name: Kotlin lint (ktlint)
    needs: changes
    if: ${{ needs.changes.outputs.kotlin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ktlintCheck spans all modules, including the Android app, whose configuration
      # needs the SDK.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlintCheck
        run: ./gradlew ktlintCheck --stacktrace

  jvm:
    name: JVM tests + coverage (backend, android, shared)
    needs: changes
    if: ${{ needs.changes.outputs.kotlin == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage PR comment
    env:
      # Ryuk's sidecar container is the most common Testcontainers CI flake; the runner is
      # ephemeral and self-cleans, so disabling it is safe. (The :backend:test task forwards
      # this env var into the test workers.)
      TESTCONTAINERS_RYUK_DISABLED: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gradle 9.4.1 runs on a modern JDK; the build's jvmToolchain(11) is provisioned
      # separately by the foojay resolver in settings.gradle.kts.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Pre-pull the Postgres image so Testcontainers' timed container start doesn't race on
      # the image download (a cause of startup-timeout flakes).
      - name: Pre-pull Postgres image
        run: docker pull postgres:16-alpine

      # Docker is preinstalled on ubuntu-latest, so the backend's Testcontainers
      # (Postgres) work with no extra setup or secrets. Each report task runs its tests.
      - name: Tests + coverage reports
        run: ./gradlew :backend:jacocoTestReport :androidApp:jacocoTestReport :shared:jvmTest --stacktrace

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/build/reports/jacoco/test/
            androidApp/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            backend/build/reports/tests/
            androidApp/build/reports/tests/
            shared/build/reports/tests/
          if-no-files-found: ignore

      - name: Coverage PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: |
            ${{ github.workspace }}/backend/build/reports/jacoco/test/jacocoTestReport.xml
            ${{ github.workspace }}/androidApp/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          # Report-only: 0 thresholds never fail the check. Raise these (and add a branch
          # protection rule requiring this job) to gate on coverage later.
          min-coverage-overall: 0
          min-coverage-changed-files: 0

  web:
    name: Web (build + lint + tests)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the coverage PR comment
    defaults:
      run:
        working-directory: webApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Tests + coverage
        run: npm run test:coverage

      - name: Coverage PR comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: webApp

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: webApp/coverage/
          if-no-files-found: warn

  android-instrumented:
    name: Android instrumented tests
    # Opt-in (FLA-72): this boots an emulator, so it runs only when android code changed AND the PR
    # carries the `ci:android` (or `ci:native`) label — or when manually dispatched with run_android.
    # A trivial change won't spend an emulator boot unless you opt in.
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_android == 'true') ||
      (github.event_name == 'pull_request' &&
       needs.changes.outputs.android == 'true' &&
       (contains(github.event.pull_request.labels.*.name, 'ci:android') ||
        contains(github.event.pull_request.labels.*.name, 'ci:native')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The Android emulator needs KVM hardware acceleration; ubuntu-latest provides it once the
      # device node is made accessible to the runner user.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache the generated AVD + its warm snapshot so most runs boot from snapshot instead of
      # cold-creating the emulator (the slowest part).
      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot."

      - name: Instrumented tests (connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :androidApp:connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: androidApp/build/reports/androidTests/
          if-no-files-found: ignore

  ios:
    name: iOS (build + shared iOS tests)
    # Opt-in (FLA-72): the macOS runner is 10×-billed, so it runs only when iOS code changed AND the PR
    # carries the `ci:ios` (or `ci:native`) label — or when manually dispatched with run_ios.
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_ios == 'true') ||
      (github.event_name == 'pull_request' &&
       needs.changes.outputs.ios == 'true' &&
       (contains(github.event.pull_request.labels.*.name, 'ci:ios') ||
        contains(github.event.pull_request.labels.*.name, 'ci:native')))
    # Apple-silicon macOS runner: matches the iosSimulatorArm64 target + has Xcode/simulators
    # preinstalled. The iosApp/ Xcode project is generated by XcodeGen (it's gitignored).
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK + Gradle to build the shared Kotlin/Native framework (jvmToolchain(11) is
      # provisioned separately by the foojay resolver).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Cache the Kotlin/Native compiler + dependencies (~1 GB) keyed on the version catalog,
      # so most runs skip the konan download.
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # Restore Xcode DerivedData so `xcodebuild test` does an incremental Swift compile and reuses
      # the already-built SwiftPM dependencies (SDWebImage*, GoogleSignIn) instead of rebuilding them
      # from scratch. The key is intentionally stable (no source hash) so it persists across commits;
      # `project.yml` bumps it when the package set / build settings change. If a stale module cache
      # ever breaks a build, bump the key suffix to clear it.
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('iosApp/project.yml') }}
          restore-keys: deriveddata-${{ runner.os }}-

      # Surface the toolchain versions to make first-run debugging easy (Xcode/SDK/runtimes).
      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep -i ios || true

      # The shared module's iOS tests compile + run the Kotlin/Native test binary on a
      # simulator: the transparent-refresh + auth + repository tests on the actual iOS target.
      - name: Shared iOS tests
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      # Build + run the Swift view-model unit tests (FLA-54) on a booted simulator. `test` needs a
      # concrete device (not a generic destination), so pick the first available iPhone simulator —
      # model/runtime-agnostic across runner images. The "Compile Kotlin Framework" build phase runs
      # embedAndSignAppleFrameworkForXcode (JAVA_HOME comes from setup-java).
      - name: Build + test iOS app (simulator)
        working-directory: iosApp
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print(next(x['udid'] for v in d.values() for x in v if 'iPhone' in x['name']))")
          echo "Using simulator $UDID"
          xcodebuild \
            -project Flashcards.xcodeproj \
            -scheme Flashcards \
            -configuration Debug \
            -destination "id=$UDID" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload iOS test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: shared/build/reports/tests/
          if-no-files-found: ignore
