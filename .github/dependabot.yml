version: 2
updates:
  # Gradle — the version catalog (gradle/libs.versions.toml) drives every Kotlin module.
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      gradle-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # These bumps require a newer Kotlin than our pinned 2.2.10 (which is held back for the
      # Kotlin/Native iOS klibs + the Ktor 3.2.x pin — see CLAUDE.md). Coil 3.5 is built against
      # Kotlin 2.4, and kotlinx-serialization 1.11 produces KN klibs our 2.2.10 compiler can't
      # consume. Revisit (remove these) when Kotlin is upgraded.
      - dependency-name: "io.coil-kt.coil3:*"
        versions: [">=3.5.0"]
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-serialization-json"
        versions: [">=1.10.0"]

  # Web app (npm).
  - package-ecosystem: npm
    directory: "/webApp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # typescript-eslint (our linter, latest 8.63.0) peers `typescript <6.1.0`, so the whole lint
      # toolchain can't run against TS 6.1+/7.x yet — adopting them breaks `npm run lint` (ERESOLVE).
      # Revisit when typescript-eslint ships TS 7 support.
      - dependency-name: "typescript"
        versions: [">=6.1.0"]

  # The GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies"]
