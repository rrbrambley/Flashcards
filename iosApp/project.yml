# XcodeGen spec — the source of truth for the iOS app project.
# `Flashcards.xcodeproj` is generated (and gitignored); run `xcodegen generate` from iosApp/.
name: Flashcards
options:
  bundleIdPrefix: com.rrbrambley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Flashcards:
    type: application
    platform: iOS
    sources:
      - path: Flashcards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rrbrambley.flashcards
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # The shared Kotlin/Native framework is produced by the build phase below into
        # shared/build/xcode-frameworks/<config>/<sdk>; find + link it (static) by name.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS: "$(inherited) -framework Shared"
    preBuildScripts:
      # Compile + stage the `Shared` Kotlin framework for the current Xcode config/SDK/arch
      # before Swift compiles. Runs Gradle's direct-integration task, which reads Xcode's
      # CONFIGURATION/SDK_NAME/ARCHS env vars.
      - name: "Compile Kotlin Framework"
        basedOnDependencyAnalysis: false
        script: |
          if [ -z "$JAVA_HOME" ]; then
            export JAVA_HOME=$(/usr/libexec/java_home)
          fi
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode

schemes:
  Flashcards:
    build:
      targets:
        Flashcards: all
    run:
      config: Debug
    archive:
      config: Release
