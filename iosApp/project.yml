# XcodeGen spec — the source of truth for the iOS app project.
# `Flashcards.xcodeproj` is generated (and gitignored); run `xcodegen generate` from iosApp/.
name: Flashcards
options:
  bundleIdPrefix: com.rrbrambley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Flashcards:
    type: application
    platform: iOS
    sources:
      - path: Flashcards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rrbrambley.flashcards
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  Flashcards:
    build:
      targets:
        Flashcards: all
    run:
      config: Debug
    archive:
      config: Release
