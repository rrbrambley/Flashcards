# XcodeGen spec — the source of truth for the iOS app project.
# `Flashcards.xcodeproj` is generated (and gitignored); run `xcodegen generate` from iosApp/.
name: Flashcards
options:
  bundleIdPrefix: com.rrbrambley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

# Swift Package Manager dependencies. Versions are pinned by the `from:` constraints below; Xcode
# resolves them on first build (Package.resolved lives in the generated, gitignored .xcodeproj).
packages:
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI
    from: "3.1.0"
  SDWebImageSVGCoder:
    url: https://github.com/SDWebImage/SDWebImageSVGCoder
    from: "1.7.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  Flashcards:
    type: application
    platform: iOS
    sources:
      - path: Flashcards
    dependencies:
      # Remote image loading + caching, incl. SVG (the Country Flags cards) via the SVG coder.
      - package: SDWebImageSwiftUI
      - package: SDWebImageSVGCoder
      # Native Google Sign-In (gated on GOOGLE_IOS_CLIENT_ID being set — see AppConfig).
      - package: GoogleSignIn
    info:
      path: Flashcards/Info.plist
      properties:
        # Home-screen / task-switcher name.
        CFBundleDisplayName: Flashcards
        # Branded launch screen: the card logo centered on the accent background.
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Dev-only: allow cleartext HTTP to a LAN/host backend (the default config is
        # http://localhost:8080). A production build should point at an HTTPS backend and drop this.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Surfaced from the per-config BACKEND_BASE_URL build setting; read via AppConfig.
        BackendBaseURL: $(BACKEND_BASE_URL)
        # Google Sign-In (FLA-50): the iOS OAuth client ID gates the button (read via AppConfig);
        # its reversed form is the OAuth callback URL scheme. Both are blank until configured (see
        # README) — when blank the Google button is hidden, matching Android/web.
        GoogleIOSClientID: $(GOOGLE_IOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rrbrambley.flashcards
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # The shared Kotlin/Native framework is produced by the build phase below into
        # shared/build/xcode-frameworks/<config>/<sdk>; find + link it (static) by name.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS: "$(inherited) -framework Shared"
      configs:
        # Simulator reaches a locally-running backend at localhost; point a device build at your
        # host's LAN IP here (and allow its ATS exception) — see the README.
        Debug: { BACKEND_BASE_URL: "http://localhost:8080" }
        Release: { BACKEND_BASE_URL: "http://localhost:8080" }
    # GOOGLE_IOS_CLIENT_ID / GOOGLE_REVERSED_CLIENT_ID come from Config.xcconfig (which optionally
    # includes the gitignored Local.xcconfig — per-developer, never committed; see SECURITY.md).
    # They must NOT be set above: target `configs` override an xcconfig base.
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    preBuildScripts:
      # Compile + stage the `Shared` Kotlin framework for the current Xcode config/SDK/arch
      # before Swift compiles. Runs Gradle's direct-integration task, which reads Xcode's
      # CONFIGURATION/SDK_NAME/ARCHS env vars.
      - name: "Compile Kotlin Framework"
        basedOnDependencyAnalysis: false
        script: |
          if [ -z "$JAVA_HOME" ]; then
            export JAVA_HOME=$(/usr/libexec/java_home)
          fi
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode

  # View-model unit tests (XCTest), hosted by the app so `@testable import Flashcards` + the Shared
  # framework resolve. Uses hand-written fakes of the shared repository interfaces (FLA-54).
  FlashcardsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FlashcardsTests
    dependencies:
      - target: Flashcards
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flashcards.app/Flashcards"
        BUNDLE_LOADER: "$(TEST_HOST)"
        # Compile-time access to the Shared framework's module (symbols resolve from the host app).
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"

schemes:
  Flashcards:
    build:
      targets:
        Flashcards: all
        FlashcardsTests: [test]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - FlashcardsTests
    run:
      config: Debug
    archive:
      config: Release
