ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
}

db {
    jdbcUrl  = "jdbc:postgresql://localhost:5432/flashcards"
    jdbcUrl  = ${?DB_JDBC_URL}
    user     = "flashcards"
    user     = ${?DB_USER}
    password = "flashcards"
    password = ${?DB_PASSWORD}
    maxPoolSize = 5
    maxPoolSize = ${?DB_MAX_POOL_SIZE}
}

auth {
    # Google OAuth Web client ID; when unset, POST /auth/google returns 503.
    googleWebClientId = ${?GOOGLE_WEB_CLIENT_ID}
}

cors {
    # Comma-separated browser origins allowed to call the API (the web app dev server).
    allowedOrigins = "http://localhost:5173"
    allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
}
