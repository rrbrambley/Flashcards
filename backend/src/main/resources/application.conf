ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
}

db {
    jdbcUrl  = "jdbc:postgresql://localhost:5432/flashcards"
    jdbcUrl  = ${?DB_JDBC_URL}
    user     = "flashcards"
    user     = ${?DB_USER}
    password = "flashcards"
    password = ${?DB_PASSWORD}
    maxPoolSize = 5
    maxPoolSize = ${?DB_MAX_POOL_SIZE}
}

auth {
    # Google OAuth client IDs accepted as ID-token audiences. The web app + Android present the Web
    # client ID; Google Sign-In on iOS presents the iOS client ID. When none are set, POST
    # /auth/google returns 503.
    googleWebClientId = ${?GOOGLE_WEB_CLIENT_ID}
    googleIosClientId = ${?GOOGLE_IOS_CLIENT_ID}
}

ratelimit {
    # Per-IP throttle on the /auth/* endpoints (brute-force / bulk-signup protection).
    auth {
        limit = 20
        limit = ${?RATE_LIMIT_AUTH_LIMIT}
        windowSeconds = 60
        windowSeconds = ${?RATE_LIMIT_AUTH_WINDOW_SECONDS}
    }
}

jwt {
    # Secret for signing/verifying access-token JWTs (HMAC256). The default is an
    # INSECURE development value — production MUST override it via JWT_SECRET.
    secret = "dev-insecure-jwt-secret-override-in-production"
    secret = ${?JWT_SECRET}
    issuer = "flashcards-backend"
    issuer = ${?JWT_ISSUER}
    audience = "flashcards-clients"
    audience = ${?JWT_AUDIENCE}
    # Access token lifetime (short — refreshed via the opaque refresh token). Default 15 min.
    accessTtlSeconds = 900
    accessTtlSeconds = ${?JWT_ACCESS_TTL_SECONDS}
    # Refresh token lifetime (opaque, DB-backed, revocable). Default 30 days.
    refreshTtlSeconds = 2592000
    refreshTtlSeconds = ${?JWT_REFRESH_TTL_SECONDS}
}

cors {
    # Comma-separated browser origins allowed to call the API (the web app dev server).
    allowedOrigins = "http://localhost:5173"
    allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
}

storage {
    # S3 (or S3-compatible) image storage. When bucket/cdnBaseUrl are unset, POST /images -> 503.
    # AWS credentials come from the default chain (AWS_ACCESS_KEY_ID/SECRET or ~/.aws), never here.
    bucket = ${?S3_BUCKET}
    region = ${?S3_REGION}
    cdnBaseUrl = ${?CDN_BASE_URL}
    # Optional S3 endpoint override (leave unset for AWS; set to a local MinIO for dev).
    endpoint = ${?S3_ENDPOINT}
}
