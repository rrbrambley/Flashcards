services:
  postgres:
    image: postgres:16-alpine
    container_name: flashcards-postgres
    environment:
      POSTGRES_DB: flashcards
      POSTGRES_USER: flashcards
      POSTGRES_PASSWORD: flashcards
    ports:
      # Override POSTGRES_PORT if 5432 is already taken on the host.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - flashcards-pgdata:/var/lib/postgresql/data

volumes:
  flashcards-pgdata:
